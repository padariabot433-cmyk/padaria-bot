<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Padaria — Pedidos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div id="loginScreen" class="login-screen">
      <div class="login-card">
        <h2>🔐 Acesso ao painel</h2>
        <p>Digite a senha para ver os pedidos da padaria.</p>
        <form id="loginForm" class="login-form">
          <input id="senhaInput" type="password" placeholder="Senha do painel" autocomplete="current-password" />
          <button type="submit">Entrar</button>
          <div id="loginError" class="login-error"></div>
        </form>
      </div>
    </div>

    <div id="appContent" class="hidden">
      <header>
        <h1>🥖 Padaria — Pedidos</h1>
        <p>Visualize os pedidos do banco em tempo real.</p>
      </header>

      <main>
        <div class="controls">
          <input id="search" type="text" placeholder="Buscar por nome ou telefone..." />
          <input id="day" type="date" />
          <select id="status">
            <option value="">Todos</option>
            <option value="pendente">Pendente</option>
            <option value="devendo">Devendo</option>
            <option value="ok">Ok</option>
            <option value="confirmado">Confirmado</option>
            <option value="entregue">Entregue</option>
            <option value="cancelado">Cancelado</option>
          </select>
          <button id="refresh">Atualizar</button>
          <label class="sound-toggle">
            <input id="soundToggle" type="checkbox" checked />
            🔔 Som de novo pedido
          </label>
          <button id="toggleMenu" type="button">🥖 Cardápio</button>
        </div>

        <div id="menuSection" class="menu-section hidden">
          <div class="menu-header">
            <h2>Cardápio</h2>
            <p class="muted">Itens desativados somem do cardápio que o cliente vê no WhatsApp, mas continuam salvos aqui.</p>
          </div>

          <form id="addMenuForm" class="menu-add-form">
            <input id="newItemName" type="text" placeholder="Nome do item (ex: Pão Francês)" required />
            <input id="newItemPrice" type="number" step="0.01" min="0" placeholder="Preço (ex: 0.75)" required />
            <button type="submit">Adicionar item</button>
          </form>

          <div id="menuList" class="menu-list"></div>
        </div>

        <div class="summary">
          <div class="summary-card">
            <strong id="count">0</strong>
            <div class="muted">Pedidos</div>
          </div>
          <div class="summary-card">
            <strong id="pendentes">0</strong>
            <div class="muted">Pendentes</div>
          </div>
          <div class="summary-card">
            <strong id="total">R$ 0,00</strong>
            <div class="muted">Total</div>
          </div>
        </div>

        <div id="orders" class="orders"></div>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
